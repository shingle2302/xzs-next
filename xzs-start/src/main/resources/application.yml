server:
  port: 8000
  undertow:
    threads:
      io: 2
      worker: 20
    buffer-size: 1024
    direct-buffers: true

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/xzs
    username: postgres
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mindskip.xzs.infrastructure.persistence.mybatis.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: xzs-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000

xzs:
  upload:
    file-path: /data/xzs/upload
    url-prefix: /api/upload

file:
  upload:
    path: /data/xzs/upload
    max-size: 52428800
  qiniu:
    access-key:
    secret-key:
    bucket:
    domain:
